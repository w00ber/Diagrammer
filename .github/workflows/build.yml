name: Build Standalone Executables

on:
  push:
    tags:
      - "v*"          # Trigger on version tags (v0.1.0, v1.0.0, etc.)
  workflow_dispatch:   # Allow manual trigger from GitHub UI
    inputs:
      release_tag:
        description: >-
          Existing release tag to attach the built executables to
          (e.g. v0.11.3). Leave blank to just build artifacts without
          touching any release.
        required: false
        default: ""

permissions:
  contents: write      # Needed to create releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            artifact: Diagrammer-macOS
          - os: windows-latest
            name: Windows
            artifact: Diagrammer-Windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      # ── Windows: generate .ico from PNG ──────────────────────────────
      - name: Install Pillow for icon generation (Windows)
        if: runner.os == 'Windows'
        run: pip install Pillow

      - name: Generate Windows icon
        if: runner.os == 'Windows'
        shell: python
        run: |
          from PIL import Image
          import os

          icon_dir = "src/diagrammer/icons"
          sizes = [16, 32, 48, 64, 128, 256]
          images = []
          for s in sizes:
              path = os.path.join(icon_dir, f"icon_{s}x{s}.png")
              if os.path.exists(path):
                  images.append(Image.open(path))
          if not images:
              images = [Image.open(os.path.join(icon_dir, "icon_256x256.png"))]
          images[0].save(
              "diagrammer.ico",
              format="ICO",
              sizes=[(img.width, img.height) for img in images],
              append_images=images[1:],
          )
          print("Created diagrammer.ico")

      # ── Build ────────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller diagrammer.spec

      # ── Package ──────────────────────────────────────────────────────
      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r -y ../Diagrammer-macOS.zip Diagrammer.app

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\Diagrammer" -DestinationPath "Diagrammer-Windows.zip"

      # ── Upload as a workflow artifact (the release job collects these) ─
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            Diagrammer-macOS.zip
            Diagrammer-Windows.zip
          if-no-files-found: ignore

  # ── Single release writer ──────────────────────────────────────────
  # All platforms upload their zips as artifacts above; this one job then
  # attaches every zip to the release in a single action-gh-release call.
  #
  # Previously each matrix job ran action-gh-release itself, so macOS and
  # Windows raced to mutate the same release concurrently — one upload could
  # 404 during finalize and get silently dropped (that is how a macOS build
  # went missing while the run still reported success). One writer removes
  # the race entirely. `needs: build` also means a failure on any single
  # platform blocks the whole release instead of shipping a partial one.
  release:
    name: Attach builds to release
    needs: build
    # Real tag pushes, or a manual dispatch that names an existing release tag
    # (used to repair a release whose assets were lost to the old race).
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: Diagrammer-*
          merge-multiple: true

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: artifacts/*.zip
          fail_on_unmatched_files: true
          # Only (re)generate notes for a genuine tagged release; never when
          # re-attaching to an existing release via manual dispatch, so a
          # hand-written release body is preserved.
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}
