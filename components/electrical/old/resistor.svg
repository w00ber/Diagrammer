<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 40">
  <g id="artwork">
    <line x1="0" y1="20" x2="20" y2="20" stroke="black" stroke-width="2"/>
    <polyline points="20,20 25,5 35,35 45,5 55,35 65,5 75,35 80,20"
              fill="none" stroke="black" stroke-width="2"/>
    <line x1="80" y1="20" x2="100" y2="20" stroke="black" stroke-width="2"/>
  </g>
  <g id="ports" display="none">
    <circle id="port:left" cx="0" cy="20" r="3"/>
    <circle id="port:right" cx="100" cy="20" r="3"/>
  </g>
  <g id="labels" display="none">
    <text id="label:value" x="50" y="10"/>
  </g>
  <metadata>
    <component stretch-h="true" stretch-v="false" min-width="60" min-height="40"/>
  </metadata>
</svg>
