<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60">
  <g id="artwork">
    <rect x="2" y="2" width="96" height="56" rx="4" ry="4"
          fill="white" stroke="black" stroke-width="2"/>
  </g>
  <g id="ports" display="none">
    <circle id="port:left" cx="0" cy="30" r="3"/>
    <circle id="port:right" cx="100" cy="30" r="3"/>
    <circle id="port:top" cx="50" cy="0" r="3"/>
    <circle id="port:bottom" cx="50" cy="60" r="3"/>
  </g>
  <g id="labels" display="none">
    <text id="label:title" x="50" y="30"/>
  </g>
  <metadata>
    <component stretch-h="true" stretch-v="true" min-width="60" min-height="40"/>
  </metadata>
</svg>
