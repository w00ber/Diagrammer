<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 145 210">
  <style>
    .title { font-family: sans-serif; font-size: 10px; font-weight: bold; fill: #444; }
    .ann { font-family: sans-serif; font-size: 8px; fill: #888; }
    .dim { font-family: sans-serif; font-size: 7px; fill: #c03; }
    .component-body { fill: none; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .lead { stroke: #333; stroke-width: 2.5; stroke-linecap: round; fill: none; }
    .wire { stroke: #07a; stroke-width: 2.5; stroke-linecap: round; fill: none; }
    .ghost { stroke: #ccc; stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 3,2; fill: none; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#aaa"/>
    </marker>
  </defs>

  <!-- ===== Top panel: Without lead shortening ===== -->
  <g transform="translate(0, 5)">
    <text class="title" x="0" y="-2">Without lead shortening</text>

    <!-- Component body (simple box) -->
    <rect x="55" y="5" width="35" height="26" class="component-body"/>

    <!-- Full lead (left) -->
    <line x1="0" y1="18" x2="55" y2="18" class="lead"/>

    <!-- Wire coming from below, turning right into port -->
    <line x1="0" y1="65" x2="0" y2="18" class="wire"/>

    <!-- Port dot -->
    <circle cx="0" cy="18" r="2.5" fill="#c33" opacity="0.7"/>

    <!-- Problem annotation: sharp corner — positioned to the right -->
    <line x1="0" y1="18" x2="12" y2="8" stroke="#c03" stroke-width="0.5"/>
    <text class="ann" x="14" y="6" fill="#c03">Sharp corner</text>

    <!-- Labels -->
    <text class="ann" x="28" y="14">lead</text>
    <text class="ann" x="4" y="48" fill="#07a">wire</text>
    <text class="ann" x="67" y="22" fill="#333">body</text>
  </g>

  <!-- Arrow between panels -->
  <g transform="translate(45, 78)">
    <line x1="0" y1="0" x2="0" y2="10" stroke="#aaa" stroke-width="1" marker-end="url(#arrowhead)"/>
  </g>

  <!-- ===== Bottom panel: With lead shortening ===== -->
  <g transform="translate(0, 98)">
    <text class="title" x="0" y="-2">With lead shortening</text>

    <!-- Component body (simple box) -->
    <rect x="55" y="5" width="35" height="26" class="component-body"/>

    <!-- Shortened lead (gap at port end) -->
    <line x1="8" y1="18" x2="55" y2="18" class="lead"/>

    <!-- Ghost of removed lead segment -->
    <line x1="0" y1="18" x2="8" y2="18" class="ghost"/>

    <!-- Wire coming from below with rounded corner -->
    <path d="M0,65 L0,26 Q0,18 8,18" class="wire"/>

    <!-- Port dot -->
    <circle cx="0" cy="18" r="2.5" fill="#c33" opacity="0.7"/>

    <!-- Dimension: corner radius -->
    <line x1="0" y1="27" x2="8" y2="27" stroke="#c03" stroke-width="0.5"/>
    <line x1="0" y1="25" x2="0" y2="29" stroke="#c03" stroke-width="0.4"/>
    <line x1="8" y1="25" x2="8" y2="29" stroke="#c03" stroke-width="0.4"/>
    <text class="dim" x="4" y="34" text-anchor="middle">8 pt</text>
    <text class="dim" x="4" y="41" text-anchor="middle">(corner r)</text>

    <!-- Annotation: smooth junction -->
    <line x1="8" y1="18" x2="18" y2="8" stroke="#2a7" stroke-width="0.5"/>
    <text class="ann" x="20" y="6" fill="#2a7">Seamless junction</text>

    <!-- Labels -->
    <text class="ann" x="28" y="14">shortened lead</text>
    <text class="ann" x="4" y="50" fill="#07a">wire</text>
  </g>
</svg>
