<svg xmlns="http://www.w3.org/2000/svg" viewBox="-45 -35 225 120">
  <style>
    .ann-text { font-family: sans-serif; font-size: 9px; fill: #666; }
    .ann-text-sm { font-family: sans-serif; font-size: 7px; fill: #888; }
    .ann-line { stroke: #bbb; stroke-width: 0.5; fill: none; }
    .legend-text { font-family: sans-serif; font-size: 7.5px; }
  </style>

  <!-- viewBox boundary -->
  <rect x="0" y="0" width="100" height="40"
        fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text class="ann-text-sm" x="50" y="-4" text-anchor="middle">viewBox: 0 0 100 40</text>

  <!-- Artwork layer (black zigzag) -->
  <path d="M22,20 l4.7-10.9 9.4,21.9 9.4-21.9 9.4,21.9 9.4-21.9 9.4,21.9 4.7-10.9"
        stroke="#333" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Leads layer (teal) -->
  <line x1="0" y1="20" x2="22" y2="20" stroke="#2a7" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="20" x2="100" y2="20" stroke="#2a7" stroke-width="3" stroke-linecap="round"/>

  <!-- Ports layer (red circles) -->
  <circle cx="0" cy="20" r="3.5" fill="#c33" opacity="0.85"/>
  <circle cx="100" cy="20" r="3.5" fill="#c33" opacity="0.85"/>

  <!-- Label anchor (orange crosshair) -->
  <line x1="46" y1="10" x2="54" y2="10" stroke="#e80" stroke-width="1"/>
  <line x1="50" y1="6" x2="50" y2="14" stroke="#e80" stroke-width="1"/>

  <!-- Annotation: port:left -->
  <line x1="0" y1="20" x2="-8" y2="36" class="ann-line"/>
  <text class="ann-text" x="-10" y="42" text-anchor="end">port:left</text>
  <text class="ann-text-sm" x="-10" y="50" text-anchor="end">(0, 20)</text>

  <!-- Annotation: port:right -->
  <line x1="100" y1="20" x2="108" y2="36" class="ann-line"/>
  <text class="ann-text" x="110" y="42">port:right</text>
  <text class="ann-text-sm" x="110" y="50">(100, 20)</text>

  <!-- Annotation: artwork -->
  <line x1="50" y1="9" x2="50" y2="-10" class="ann-line"/>
  <line x1="50" y1="-10" x2="90" y2="-10" class="ann-line"/>
  <text class="ann-text" x="92" y="-7" fill="#333">artwork</text>

  <!-- Annotation: leads -->
  <line x1="11" y1="20" x2="11" y2="32" class="ann-line"/>
  <line x1="11" y1="32" x2="30" y2="32" class="ann-line"/>
  <text class="ann-text" x="32" y="35" fill="#2a7">leads</text>

  <!-- Annotation: label:value -->
  <line x1="50" y1="14" x2="50" y2="22" class="ann-line" stroke-dasharray="1,1"/>
  <line x1="54" y1="10" x2="68" y2="3" class="ann-line"/>
  <text class="ann-text" x="70" y="5" fill="#e80">label:value</text>
  <text class="ann-text-sm" x="70" y="13">(50, 10)</text>

  <!-- Legend -->
  <g transform="translate(0, 58)">
    <rect x="-2" y="-2" width="155" height="16" fill="#fafafa" stroke="#eee" stroke-width="0.5" rx="2"/>

    <line x1="2" y1="6" x2="12" y2="6" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
    <text class="legend-text" x="15" y="9" fill="#333">artwork</text>

    <line x1="45" y1="6" x2="55" y2="6" stroke="#2a7" stroke-width="2.5" stroke-linecap="round"/>
    <text class="legend-text" x="58" y="9" fill="#2a7">leads</text>

    <circle cx="88" cy="6" r="3" fill="#c33" opacity="0.85"/>
    <text class="legend-text" x="94" y="9" fill="#c33">ports</text>

    <line x1="118" y1="3" x2="118" y2="9" stroke="#e80" stroke-width="1"/>
    <line x1="115" y1="6" x2="121" y2="6" stroke="#e80" stroke-width="1"/>
    <text class="legend-text" x="125" y="9" fill="#e80">labels</text>
  </g>
</svg>
